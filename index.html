<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Golf-tuloslaskuri</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 7px 3px;
            text-align: center;
        }

        th {
            background-color: #e8e8e8;
        }

        .score-input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            text-align: center;
            font-size: 17px;
            padding: 5px 0;
            background: transparent;
        }

        .score-input:focus {
            outline: 2px solid #777;
            background-color: #fff;
        }

        .player-name {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            padding: 6px 2px;
            background-color: white;
        }

        .subtotal {
            font-weight: bold;
            background-color: #eeeeee;
        }

        .total {
            font-weight: bold;
            background-color: #dddddd;
            font-size: 16px;
        }

        button {
            width: 100%;
            margin: 10px 0;
            padding: 13px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 6px;
            background-color: white;
        }

        #voiceButton {
            font-weight: bold;
            font-size: 18px;
        }

        #voiceButton.listening {
            background-color: #ffd7d7;
        }

        #voiceStatus {
            padding: 10px;
            margin: 8px 0;
            min-height: 22px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
        }

        .example {
            font-size: 13px;
            line-height: 1.4;
            color: #444;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h2>Golf-tuloslaskuri</h2>

    <button type="button" id="voiceButton" onclick="startVoiceInput()">
        🎤 Anna tulokset puheella
    </button>

    <div id="voiceStatus">
        Paina mikrofonipainiketta ja sano tulokset.
    </div>

    <div class="example">
        Esimerkki:<br>
        <strong>Reikä 1, Petri 5, Seppo 4, Matti 6, Jari 5</strong>
    </div>

    <table>
        <thead>
            <tr>
                <th>Reikä</th>

                <th>
                    <input
                        type="text"
                        class="player-name"
                        id="name1"
                        value="P1"
                        maxlength="12"
                    >
                </th>

                <th>
                    <input
                        type="text"
                        class="player-name"
                        id="name2"
                        value="P2"
                        maxlength="12"
                    >
                </th>

                <th>
                    <input
                        type="text"
                        class="player-name"
                        id="name3"
                        value="P3"
                        maxlength="12"
                    >
                </th>

                <th>
                    <input
                        type="text"
                        class="player-name"
                        id="name4"
                        value="P4"
                        maxlength="12"
                    >
                </th>
            </tr>
        </thead>

        <tbody id="table-body"></tbody>

        <tfoot>
            <tr class="total">
                <td>Yhteensä</td>
                <td id="sum1">0</td>
                <td id="sum2">0</td>
                <td id="sum3">0</td>
                <td id="sum4">0</td>
            </tr>
        </tfoot>
    </table>

    <button type="button" onclick="resetScores()">
        Tyhjennä tulokset
    </button>

    <script>
        const tbody = document.getElementById("table-body");

        for (let hole = 1; hole <= 18; hole++) {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${hole}</td>

                <td>
                    <input
                        type="number"
                        min="1"
                        max="20"
                        inputmode="numeric"
                        class="score-input p1"
                        data-hole="${hole}"
                    >
                </td>

                <td>
                    <input
                        type="number"
                        min="1"
                        max="20"
                        inputmode="numeric"
                        class="score-input p2"
                        data-hole="${hole}"
                    >
                </td>

                <td>
                    <input
                        type="number"
                        min="1"
                        max="20"
                        inputmode="numeric"
                        class="score-input p3"
                        data-hole="${hole}"
                    >
                </td>

                <td>
                    <input
                        type="number"
                        min="1"
                        max="20"
                        inputmode="numeric"
                        class="score-input p4"
                        data-hole="${hole}"
                    >
                </td>
            `;

            tbody.appendChild(row);

            if (hole === 9) {
                const frontNineRow = document.createElement("tr");
                frontNineRow.className = "subtotal";

                frontNineRow.innerHTML = `
                    <td>Etuysi</td>
                    <td id="front1">0</td>
                    <td id="front2">0</td>
                    <td id="front3">0</td>
                    <td id="front4">0</td>
                `;

                tbody.appendChild(frontNineRow);
            }

            if (hole === 18) {
                const backNineRow = document.createElement("tr");
                backNineRow.className = "subtotal";

                backNineRow.innerHTML = `
                    <td>Takaysi</td>
                    <td id="back1">0</td>
                    <td id="back2">0</td>
                    <td id="back3">0</td>
                    <td id="back4">0</td>
                `;

                tbody.appendChild(backNineRow);
            }
        }

        document.querySelectorAll(".score-input").forEach(input => {
            input.addEventListener("input", calculateScores);
        });

        function calculateScores() {
            for (let player = 1; player <= 4; player++) {
                let frontNine = 0;
                let backNine = 0;

                document.querySelectorAll(".p" + player).forEach(input => {
                    const score = Number(input.value) || 0;
                    const hole = Number(input.dataset.hole);

                    if (hole <= 9) {
                        frontNine += score;
                    } else {
                        backNine += score;
                    }
                });

                document.getElementById("front" + player).textContent = frontNine;
                document.getElementById("back" + player).textContent = backNine;
                document.getElementById("sum" + player).textContent =
                    frontNine + backNine;
            }
        }

        function normalizeText(text) {
            return text
                .toLowerCase()
                .replace(/[.,:;]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function wordToNumber(value) {
            const numbers = {
                "yksi": 1,
                "kaksi": 2,
                "kolme": 3,
                "neljä": 4,
                "viisi": 5,
                "kuusi": 6,
                "seitsemän": 7,
                "kahdeksan": 8,
                "yhdeksän": 9,
                "kymmenen": 10,
                "yksitoista": 11,
                "kaksitoista": 12,
                "kolmetoista": 13,
                "neljätoista": 14,
                "viisitoista": 15,
                "kuusitoista": 16,
                "seitsemäntoista": 17,
                "kahdeksantoista": 18,
                "yhdeksäntoista": 19,
                "kaksikymmentä": 20
            };

            if (/^\d+$/.test(value)) {
                return Number(value);
            }

            return numbers[value] ?? null;
        }

        function getPlayerNames() {
            const players = [];

            for (let player = 1; player <= 4; player++) {
                const name = document
                    .getElementById("name" + player)
                    .value
                    .trim()
                    .toLowerCase();

                if (name) {
                    players.push({
                        playerNumber: player,
                        name: name
                    });
                }
            }

            players.sort((a, b) => b.name.length - a.name.length);

            return players;
        }

        function parseVoiceResults(spokenText) {
            const text = normalizeText(spokenText);
            const words = text.split(" ");
            const players = getPlayerNames();

            let hole = null;

            const holeWordIndex = words.findIndex(word =>
                word === "reikä" ||
                word === "reika" ||
                word === "väylä" ||
                word === "vayla"
            );

            if (holeWordIndex !== -1 && words[holeWordIndex + 1]) {
                hole = wordToNumber(words[holeWordIndex + 1]);
            }

            if (!hole || hole < 1 || hole > 18) {
                throw new Error("Reiän numeroa ei tunnistettu.");
            }

            let addedScores = [];

            players.forEach(player => {
                const nameWords = player.name.split(" ");

                for (let i = 0; i < words.length; i++) {
                    const possibleName = words
                        .slice(i, i + nameWords.length)
                        .join(" ");

                    if (possibleName === player.name) {
                        const scoreWord = words[i + nameWords.length];
                        const score = wordToNumber(scoreWord);

                        if (score !== null && score >= 1 && score <= 20) {
                            const input = document.querySelector(
                                `.p${player.playerNumber}[data-hole="${hole}"]`
                            );

                            if (input) {
                                input.value = score;
                                addedScores.push(
                                    `${player.name}: ${score}`
                                );
                            }
                        }

                        break;
                    }
                }
            });

            if (addedScores.length === 0) {
                throw new Error(
                    "Pelaajien nimiä ja tuloksia ei tunnistettu."
                );
            }

            calculateScores();

            return {
                hole,
                addedScores
            };
        }

        function startVoiceInput() {
            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            const button = document.getElementById("voiceButton");
            const status = document.getElementById("voiceStatus");

            if (!SpeechRecognition) {
                status.textContent =
                    "Tämä selain ei tue puheentunnistusta. Avaa sivu iPhonen Safarissa.";

                return;
            }

            const recognition = new SpeechRecognition();

            recognition.lang = "fi-FI";
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 3;

            recognition.onstart = function() {
                button.classList.add("listening");
                button.textContent = "🎤 Kuuntelen…";

                status.textContent =
                    "Sano esimerkiksi: Reikä 1, Petri 5, Seppo 4.";
            };

            recognition.onresult = function(event) {
                const alternatives = event.results[0];

                let successfulResult = null;
                let lastError = null;
                let heardText = alternatives[0].transcript;

                for (let i = 0; i < alternatives.length; i++) {
                    try {
                        successfulResult = parseVoiceResults(
                            alternatives[i].transcript
                        );

                        heardText = alternatives[i].transcript;
                        break;
                    } catch (error) {
                        lastError = error;
                    }
                }

                if (successfulResult) {
                    status.innerHTML =
                        `<strong>Kuulin:</strong> ${heardText}<br>` +
                        `<strong>Reikä ${successfulResult.hole}:</strong> ` +
                        successfulResult.addedScores.join(", ");
                } else {
                    status.innerHTML =
                        `<strong>Kuulin:</strong> ${heardText}<br>` +
                        `<strong>Virhe:</strong> ${lastError.message}`;
                }
            };

            recognition.onerror = function(event) {
                let message = "Puheentunnistus epäonnistui.";

                if (event.error === "not-allowed") {
                    message =
                        "Mikrofonin tai puheentunnistuksen käyttöä ei sallittu.";
                }

                if (event.error === "no-speech") {
                    message = "Puhetta ei kuulunut. Yritä uudelleen.";
                }

                status.textContent = message;
            };

            recognition.onend = function() {
                button.classList.remove("listening");
                button.textContent = "🎤 Anna tulokset puheella";
            };

            recognition.start();
        }

        function resetScores() {
            const confirmed = confirm(
                "Haluatko varmasti tyhjentää kaikki tulokset?"
            );

            if (!confirmed) {
                return;
            }

            document.querySelectorAll(".score-input").forEach(input => {
                input.value = "";
            });

            calculateScores();

            document.getElementById("voiceStatus").textContent =
                "Tulokset tyhjennettiin.";
        }
    </script>

</body>
</html>
