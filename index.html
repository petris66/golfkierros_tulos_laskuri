
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf-tuloslaskuri</title>

    <style>
        :root {
            --bg: #f3f5f2;
            --card: #ffffff;
            --border: #cfd5cf;
            --soft: #e9eee8;
            --strong: #dce5db;
            --text: #1f2a22;
            --danger: #fff0f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 12px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .app {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            margin: 4px 0 14px;
            text-align: center;
            font-size: 24px;
        }

        .card {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 17px;
        }

        .player-count {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .player-count button,
        .action-button {
            min-height: 46px;
            padding: 10px;
            border: 1px solid #9da69e;
            border-radius: 8px;
            background: white;
            font-size: 16px;
            cursor: pointer;
        }

        .player-count button.active {
            font-weight: bold;
            background: var(--strong);
            border-color: #6f7c70;
        }

        .next-hole-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .next-hole-label {
            font-size: 15px;
        }

        .next-hole-number {
            font-size: 34px;
            font-weight: bold;
        }

        #voiceButton {
            width: 100%;
            min-height: 54px;
            font-size: 18px;
            font-weight: bold;
        }

        #voiceButton.listening {
            background: var(--danger);
        }

        #voiceStatus {
            margin-top: 10px;
            padding: 10px;
            min-height: 46px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            line-height: 1.4;
        }

        .example {
            margin-top: 8px;
            font-size: 13px;
            color: #4b554d;
            line-height: 1.4;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 10px;
        }

        table {
            width: 100%;
            min-width: 420px;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 7px 4px;
            text-align: center;
        }

        th {
            background: var(--soft);
        }

        .hole-cell {
            width: 54px;
            font-weight: bold;
        }

        .player-name {
            width: 100%;
            min-width: 66px;
            padding: 7px 4px;
            border: 1px solid #aeb6ae;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            background: white;
        }

        .score-input {
            width: 100%;
            min-width: 54px;
            padding: 7px 0;
            border: none;
            text-align: center;
            font-size: 18px;
            background: transparent;
        }

        .score-input:focus {
            outline: 2px solid #7a877b;
            background: white;
        }

        .subtotal {
            font-weight: bold;
            background: #eef1ed;
        }

        .total {
            font-weight: bold;
            font-size: 16px;
            background: #dde3dc;
        }

        .actions {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }

        .muted {
            color: #59625b;
            font-size: 13px;
        }

        .hidden-player {
            display: none;
        }

        @media (max-width: 500px) {
            body {
                padding: 8px;
            }

            h1 {
                font-size: 21px;
            }

            th,
            td {
                padding: 6px 2px;
            }

            .player-name {
                font-size: 13px;
            }
        }

        .round-complete-actions { display: none; gap: 8px; margin-top: 10px; }
        .round-complete-actions.visible { display: grid; }
        .primary-button { font-weight: bold; background: var(--strong); border-color: #6f7c70; }
        .modal-backdrop {
            display: none; position: fixed; inset: 0; z-index: 1000;
            padding: 18px; background: rgba(0,0,0,.45);
            align-items: center; justify-content: center;
        }
        .modal-backdrop.visible { display: flex; }
        .modal-card {
            width: min(100%, 440px); padding: 18px; border-radius: 12px;
            background: white; box-shadow: 0 12px 40px rgba(0,0,0,.25);
        }
        .modal-card h2 { margin: 0 0 10px; text-align: left; font-size: 21px; }
        .modal-card p { margin: 0 0 14px; line-height: 1.5; }
        .modal-actions { display: grid; gap: 8px; }
        .saved-message { margin-top: 10px; font-weight: bold; }

    </style>
</head>

<body>
    <main class="app">
        <h1>Golf-tuloslaskuri <span style="font-size:14px;font-weight:normal;">v2.3</span></h1>

        <section class="card">
            <h2 class="section-title">Pelaajien määrä</h2>

            <div class="player-count" id="playerCountButtons">
                <button type="button" data-count="1">1</button>
                <button type="button" data-count="2">2</button>
                <button type="button" data-count="3">3</button>
                <button type="button" data-count="4">4</button>
            </div>
        </section>

        <section class="card next-hole-box">
            <div>
                <div class="next-hole-label">Seuraava reikä</div>
                <div class="muted">Reikä vaihtuu onnistuneen kirjauksen jälkeen.</div>
            </div>

            <div class="next-hole-number" id="nextHole">1</div>
        </section>

        <section class="card">
            <button
                type="button"
                class="action-button"
                id="voiceButton"
                onclick="startVoiceInput()"
            >
                🎤 Anna tulokset puheella
            </button>

            <div id="voiceStatus">
                Paina mikrofonipainiketta ja sano tulokset.
            </div>

            <div class="example" id="voiceExample">
                Esimerkki yhdellä pelaajalla: <strong>yks viis</strong>
            </div>

            <div class="round-complete-actions" id="roundCompleteActions">
                <button type="button" class="action-button primary-button"
                        onclick="saveCompletedRound()">
                    💾 Tallenna tarkistettu kierros
                </button>
            </div>
        </section>

        <section class="table-wrap">
            <table>
                <thead>
                    <tr id="headerRow">
                        <th class="hole-cell">Reikä</th>
                        <th class="player-column" data-player="1">
                            <input
                                type="text"
                                class="player-name"
                                id="name1"
                                value="P1"
                                maxlength="12"
                                aria-label="Pelaajan 1 nimi"
                            >
                        </th>
                        <th class="player-column" data-player="2">
                            <input
                                type="text"
                                class="player-name"
                                id="name2"
                                value="P2"
                                maxlength="12"
                                aria-label="Pelaajan 2 nimi"
                            >
                        </th>
                        <th class="player-column" data-player="3">
                            <input
                                type="text"
                                class="player-name"
                                id="name3"
                                value="P3"
                                maxlength="12"
                                aria-label="Pelaajan 3 nimi"
                            >
                        </th>
                        <th class="player-column" data-player="4">
                            <input
                                type="text"
                                class="player-name"
                                id="name4"
                                value="P4"
                                maxlength="12"
                                aria-label="Pelaajan 4 nimi"
                            >
                        </th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>

                <tfoot>
                    <tr class="total">
                        <td>Yhteensä</td>
                        <td class="player-column" data-player="1" id="sum1">0</td>
                        <td class="player-column" data-player="2" id="sum2">0</td>
                        <td class="player-column" data-player="3" id="sum3">0</td>
                        <td class="player-column" data-player="4" id="sum4">0</td>
                    </tr>
                </tfoot>
            </table>
        </section>

        <div class="actions">
            <button type="button" class="action-button" onclick="resetRound()">
                Aloita uusi kierros
            </button>
        </div>
    </main>

    <div class="modal-backdrop" id="roundCompleteModal" role="dialog"
         aria-modal="true" aria-labelledby="roundCompleteTitle">
        <div class="modal-card">
            <h2 id="roundCompleteTitle">18 reikää pelattu</h2>
            <p>Haluatko tallentaa kierroksen heti vai tarkistaa tulokset ensin?</p>

            <div class="modal-actions">
                <button type="button" class="action-button"
                        onclick="reviewCompletedRound()">
                    Tarkista kierros
                </button>

                <button type="button" class="action-button primary-button"
                        onclick="saveCompletedRound()">
                    Tallenna kierros
                </button>
            </div>

            <div class="saved-message" id="savedMessage"></div>
        </div>
    </div>

    <script>
        "use strict";

        const STORAGE_KEY = "golfTuloslaskuriV2";
        const HISTORY_KEY = "golfTuloslaskuriHistory";
        const MAX_PLAYERS = 4;

        let playerCount = 1;
        let nextHole = 1;
        let roundComplete = false;

        const tableBody = document.getElementById("tableBody");
        const voiceStatus = document.getElementById("voiceStatus");
        const voiceButton = document.getElementById("voiceButton");
        const nextHoleElement = document.getElementById("nextHole");
        const voiceExample = document.getElementById("voiceExample");
        const roundCompleteModal = document.getElementById("roundCompleteModal");
        const roundCompleteActions = document.getElementById("roundCompleteActions");
        const savedMessage = document.getElementById("savedMessage");

        function buildScoreTable() {
            tableBody.innerHTML = "";

            for (let hole = 1; hole <= 18; hole++) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td class="hole-cell">${hole}</td>
                    ${buildPlayerCells(hole)}
                `;

                tableBody.appendChild(row);

                if (hole === 9) {
                    tableBody.appendChild(buildSubtotalRow("Etuysi", "front"));
                }

                if (hole === 18) {
                    tableBody.appendChild(buildSubtotalRow("Takaysi", "back"));
                }
            }

            document.querySelectorAll(".score-input").forEach(input => {
                input.addEventListener("input", () => {
                    calculateScores();
                    saveState();
                });
            });
        }

        function buildPlayerCells(hole) {
            let html = "";

            for (let player = 1; player <= MAX_PLAYERS; player++) {
                html += `
                    <td class="player-column" data-player="${player}">
                        <input
                            type="number"
                            min="1"
                            max="20"
                            inputmode="numeric"
                            class="score-input p${player}"
                            data-hole="${hole}"
                            aria-label="Pelaaja ${player}, reikä ${hole}"
                        >
                    </td>
                `;
            }

            return html;
        }

        function buildSubtotalRow(label, prefix) {
            const row = document.createElement("tr");
            row.className = "subtotal";

            let cells = `<td>${label}</td>`;

            for (let player = 1; player <= MAX_PLAYERS; player++) {
                cells += `
                    <td
                        class="player-column"
                        data-player="${player}"
                        id="${prefix}${player}"
                    >
                        0
                    </td>
                `;
            }

            row.innerHTML = cells;
            return row;
        }

        function setPlayerCount(count) {
            playerCount = Math.min(Math.max(Number(count) || 1, 1), MAX_PLAYERS);

            document.querySelectorAll("#playerCountButtons button").forEach(button => {
                button.classList.toggle(
                    "active",
                    Number(button.dataset.count) === playerCount
                );
            });

            document.querySelectorAll(".player-column").forEach(column => {
                const player = Number(column.dataset.player);
                column.classList.toggle("hidden-player", player > playerCount);
            });

            updateVoiceExample();
            calculateScores();
            saveState();
        }

        function updateVoiceExample() {
            const examples = {
                1: "Esimerkki: <strong>yks viis</strong>",
                2: "Esimerkki: <strong>yks viis neljä</strong>",
                3: "Esimerkki: <strong>yks viis neljä kuus</strong>",
                4: "Esimerkki: <strong>yks viis neljä kuus viis</strong>"
            };

            voiceExample.innerHTML = examples[playerCount];
        }

        function calculateScores() {
            for (let player = 1; player <= MAX_PLAYERS; player++) {
                let front = 0;
                let back = 0;

                document.querySelectorAll(`.p${player}`).forEach(input => {
                    const score = Number(input.value) || 0;
                    const hole = Number(input.dataset.hole);

                    if (hole <= 9) {
                        front += score;
                    } else {
                        back += score;
                    }
                });

                document.getElementById(`front${player}`).textContent = front;
                document.getElementById(`back${player}`).textContent = back;
                document.getElementById(`sum${player}`).textContent = front + back;
            }
        }

        function normalizeText(text) {
            return text
                .toLowerCase()
                .replace(/[.,:;!?]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function wordToNumber(value) {
            const numbers = {
                "yksi": 1,
                "yks": 1,
                "kaksi": 2,
                "kaks": 2,
                "kolme": 3,
                "kolm": 3,
                "neljä": 4,
                "nelja": 4,
                "nelkku": 4,
                "viisi": 5,
                "viis": 5,
                "kuusi": 6,
                "kuus": 6,
                "seitsemän": 7,
                "seitseman": 7,
                "seiska": 7,
                "kahdeksan": 8,
                "kahdeks": 8,
                "kasi": 8,
                "yhdeksän": 9,
                "yhdeksan": 9,
                "ysi": 9,
                "kymmenen": 10,
                "kymppi": 10,
                "yksitoista": 11,
                "kaksitoista": 12,
                "kolmetoista": 13,
                "neljätoista": 14,
                "neljatoista": 14,
                "viisitoista": 15,
                "kuusitoista": 16,
                "seitsemäntoista": 17,
                "seitsemantoista": 17,
                "kahdeksantoista": 18,
                "yhdeksäntoista": 19,
                "yhdeksantoista": 19,
                "kaksikymmentä": 20,
                "kaksikymmenta": 20
            };

            if (/^\d+$/.test(value)) {
                return Number(value);
            }

            return numbers[value] ?? null;
        }

        function decodeCompactDigits(digits) {
            /*
                iPhone voi yhdistää puheen yhdeksi luvuksi:

                2 pelaajaa:
                "viis neljä"       -> "54"
                "yks viis neljä"   -> "154"
                "kymmenen viis neljä" -> "1054"
            */

            const digitArray = digits.split("").map(Number);

            // Pelkät tulokset nykyiselle seuraavalle reiälle.
            if (digits.length === playerCount) {
                return digitArray;
            }

            // Yksinumeroinen reikä 1–9 + pelaajien tulokset.
            if (digits.length === playerCount + 1) {
                const hole = Number(digits.slice(0, 1));
                const scores = digits.slice(1).split("").map(Number);

                if (hole >= 1 && hole <= 9) {
                    return [hole, ...scores];
                }
            }

            // Kaksinumeroinen reikä 10–18 + pelaajien tulokset.
            if (digits.length === playerCount + 2) {
                const hole = Number(digits.slice(0, 2));
                const scores = digits.slice(2).split("").map(Number);

                if (hole >= 10 && hole <= 18) {
                    return [hole, ...scores];
                }
            }

            // Jos merkkijono ei sovi yllä oleviin muotoihin,
            // käsitellään se tavallisena kokonaislukuna.
            return [Number(digits)];
        }

        function extractNumbers(spokenText) {
            const words = normalizeText(spokenText).split(" ");
            const recognized = [];

            words.forEach(word => {
                const number = wordToNumber(word);

                if (number !== null) {
                    recognized.push({
                        raw: word,
                        number,
                        isDigits: /^\d+$/.test(word)
                    });
                }
            });

            if (recognized.length === 0) {
                return [];
            }

            // Esimerkiksi "154" tai "54".
            if (
                recognized.length === 1 &&
                recognized[0].isDigits &&
                recognized[0].raw.length >= 2
            ) {
                return decodeCompactDigits(recognized[0].raw);
            }

            // Esimerkiksi "reikä 10 54".
            if (
                recognized.length === 2 &&
                recognized[0].number >= 1 &&
                recognized[0].number <= 18 &&
                recognized[1].isDigits &&
                recognized[1].raw.length === playerCount
            ) {
                return [
                    recognized[0].number,
                    ...recognized[1].raw.split("").map(Number)
                ];
            }

            return recognized.map(item => item.number);
        }

        function parseVoiceResults(spokenText) {
            const numbers = extractNumbers(spokenText);

            if (numbers.length === 0) {
                throw new Error("Numeroita ei tunnistettu.");
            }

            const expectedWithHole = playerCount + 1;
            const expectedWithoutHole = playerCount;

            let hole;
            let scores;

            if (numbers.length === expectedWithHole) {
                hole = numbers[0];
                scores = numbers.slice(1);
            } else if (numbers.length === expectedWithoutHole) {
                hole = nextHole;
                scores = numbers;
            } else if (numbers.length < expectedWithoutHole) {
                throw new Error("Tuloksia puuttuu.");
            } else if (numbers.length > expectedWithHole) {
                throw new Error("Liikaa numeroita.");
            } else {
                throw new Error(
                    `Sano ${playerCount} tulosta tai reiän numero ja ${playerCount} tulosta.`
                );
            }

            if (hole < 1 || hole > 18) {
                throw new Error("Reiän numeron pitää olla 1–18.");
            }

            if (scores.length !== playerCount) {
                throw new Error("Tulosten määrä ei vastaa pelaajien määrää.");
            }

            scores.forEach(score => {
                if (score < 1 || score > 20) {
                    throw new Error("Tuloksen pitää olla 1–20.");
                }
            });

            const addedScores = [];

            scores.forEach((score, index) => {
                const player = index + 1;
                const input = document.querySelector(
                    `.p${player}[data-hole="${hole}"]`
                );

                if (!input) {
                    return;
                }

                input.value = score;

                const playerName =
                    document.getElementById(`name${player}`).value.trim() ||
                    `P${player}`;

                addedScores.push(`${playerName}: ${score}`);
            });

            calculateScores();

            if (hole < 18) {
                nextHole = hole + 1;
            } else {
                nextHole = 18;
                roundComplete = true;
            }

            updateNextHole();
            updateRoundCompleteState();
            saveState();

            return {
                hole,
                addedScores
            };
        }

        function startVoiceInput() {
            if (roundComplete) {
                voiceStatus.textContent =
                    "Kierros on valmis. Tarkista tai tallenna kierros ennen uutta kirjausta.";
                speakMessage("Kierros on valmis");
                showRoundCompleteModal();
                return;
            }

            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                voiceStatus.textContent =
                    "Tämä selain ei tue puheentunnistusta.";
                return;
            }

            const recognition = new SpeechRecognition();

            recognition.lang = "fi-FI";
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 5;

            recognition.onstart = function() {
                voiceButton.classList.add("listening");
                voiceButton.textContent = "🎤 Kuuntelen…";
                voiceStatus.textContent = "Sano reiän numero ja tulokset.";
            };

            recognition.onspeechstart = function() {
                voiceStatus.textContent = "🎤 Kuulen puhetta…";
            };

            recognition.onresult = function(event) {
                const alternatives = event.results[0];
                let successfulResult = null;
                let heardText = alternatives[0].transcript;
                let lastError = new Error("Puhetta ei voitu käsitellä.");

                for (let i = 0; i < alternatives.length; i++) {
                    try {
                        successfulResult = parseVoiceResults(
                            alternatives[i].transcript
                        );
                        heardText = alternatives[i].transcript;
                        break;
                    } catch (error) {
                        lastError = error;
                    }
                }

                if (successfulResult) {
                    voiceStatus.innerHTML =
                        `<strong>Reikä ${successfulResult.hole} tallennettu ✅</strong><br>` +
                        successfulResult.addedScores.join(", ");

                    speakConfirmation(successfulResult.hole);

                    if (successfulResult.hole === 18) {
                        setTimeout(showRoundCompleteModal, 450);
                    }
                } else {
                    voiceStatus.innerHTML =
                        `<strong>Kuulin:</strong> ${escapeHtml(heardText)}<br>` +
                        `<strong>Virhe:</strong> ${escapeHtml(lastError.message)}`;

                    speakMessage(lastError.message);
                }
            };

            recognition.onerror = function(event) {
                const messages = {
                    "no-speech": "Puhetta ei kuulunut.",
                    "not-allowed": "Mikrofonin käyttöä ei sallittu.",
                    "audio-capture": "Mikrofonia ei löytynyt.",
                    "network": "Puheentunnistuksen verkkovirhe."
                };

                const message =
                    messages[event.error] || "Puheentunnistus epäonnistui.";

                voiceStatus.textContent = message;
                speakMessage(message);
            };

            recognition.onend = function() {
                voiceButton.classList.remove("listening");
                voiceButton.textContent = "🎤 Anna tulokset puheella";
            };

            recognition.start();
        }

        function speakConfirmation(hole) {
            speakMessage(`Reikä ${hole} tallennettu`);
        }

        function speakMessage(text) {
            if (!("speechSynthesis" in window)) {
                return;
            }

            window.speechSynthesis.cancel();

            const message = new SpeechSynthesisUtterance(text);
            message.lang = "fi-FI";
            message.rate = 0.9;
            message.volume = 1;

            window.speechSynthesis.speak(message);
        }

        function updateNextHole() {
            nextHoleElement.textContent = nextHole;
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function saveState() {
            const state = {
                playerCount,
                nextHole,
                roundComplete,
                names: [],
                scores: {}
            };

            for (let player = 1; player <= MAX_PLAYERS; player++) {
                state.names.push(
                    document.getElementById(`name${player}`).value
                );

                state.scores[player] = [];

                document.querySelectorAll(`.p${player}`).forEach(input => {
                    state.scores[player].push(input.value);
                });
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);

            if (!raw) {
                setPlayerCount(1);
                updateNextHole();
                return;
            }

            try {
                const state = JSON.parse(raw);

                playerCount = Number(state.playerCount) || 1;
                nextHole = Number(state.nextHole) || 1;
                roundComplete = Boolean(state.roundComplete);

                for (let player = 1; player <= MAX_PLAYERS; player++) {
                    const name = state.names?.[player - 1];

                    if (typeof name === "string") {
                        document.getElementById(`name${player}`).value = name;
                    }

                    const scores = state.scores?.[player] || [];

                    document.querySelectorAll(`.p${player}`).forEach((input, index) => {
                        input.value = scores[index] || "";
                    });
                }

                setPlayerCount(playerCount);
                updateNextHole();
                calculateScores();
                updateRoundCompleteState();
            } catch (error) {
                localStorage.removeItem(STORAGE_KEY);
                setPlayerCount(1);
                updateNextHole();
            }
        }



        function updateRoundCompleteState() {
            voiceButton.disabled = roundComplete;
            voiceButton.textContent = roundComplete
                ? "Kierros valmis"
                : "🎤 Anna tulokset puheella";

            roundCompleteActions.classList.toggle("visible", roundComplete);
        }

        function showRoundCompleteModal() {
            savedMessage.textContent = "";
            roundCompleteModal.classList.add("visible");
        }

        function hideRoundCompleteModal() {
            roundCompleteModal.classList.remove("visible");
        }

        function reviewCompletedRound() {
            hideRoundCompleteModal();

            voiceStatus.innerHTML =
                "<strong>Kierros valmis.</strong> Tarkista tulokset taulukosta ja korjaa tarvittaessa. " +
                "Tallenna sen jälkeen painikkeella “Tallenna tarkistettu kierros”.";

            document.querySelector("table").scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        }

        function buildRoundSnapshot() {
            const snapshot = {
                savedAt: new Date().toISOString(),
                playerCount,
                names: [],
                scores: {},
                totals: {}
            };

            for (let player = 1; player <= playerCount; player++) {
                const name =
                    document.getElementById(`name${player}`).value.trim() ||
                    `P${player}`;

                snapshot.names.push(name);
                snapshot.scores[player] = [];

                document.querySelectorAll(`.p${player}`).forEach(input => {
                    snapshot.scores[player].push(Number(input.value) || 0);
                });

                snapshot.totals[player] =
                    Number(document.getElementById(`sum${player}`).textContent) || 0;
            }

            return snapshot;
        }

        function saveCompletedRound() {
            const snapshot = buildRoundSnapshot();
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

            history.unshift(snapshot);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

            hideRoundCompleteModal();

            voiceStatus.innerHTML =
                "<strong>Kierros tallennettu ✅</strong><br>" +
                snapshot.names
                    .map((name, index) =>
                        `${escapeHtml(name)}: ${snapshot.totals[index + 1]}`
                    )
                    .join(", ");

            speakMessage("Kierros tallennettu");
        }

        function processResultsFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const spokenText = params.get("tulos");

            if (!spokenText) {
                return;
            }

            try {
                const result = parseVoiceResults(spokenText);

                voiceStatus.innerHTML =
                    `<strong>Reikä ${result.hole} tallennettu ✅</strong><br>` +
                    result.addedScores.join(", ");

                speakConfirmation(result.hole);

                if (result.hole === 18) {
                    setTimeout(showRoundCompleteModal, 450);
                }
            } catch (error) {
                voiceStatus.innerHTML =
                    `<strong>Vastaanotettu:</strong> ${escapeHtml(spokenText)}<br>` +
                    `<strong>Virhe:</strong> ${escapeHtml(error.message)}`;

                speakMessage(error.message);
            }

            // Poistetaan tulos-parametri osoitteesta, jotta sama tulos
            // ei tallennu uudelleen sivua päivitettäessä.
            const cleanUrl =
                window.location.origin +
                window.location.pathname +
                window.location.hash;

            window.history.replaceState({}, document.title, cleanUrl);
        }

        function resetRound() {
            const confirmed = confirm(
                "Haluatko varmasti aloittaa uuden kierroksen? Kaikki tulokset poistetaan."
            );

            if (!confirmed) {
                return;
            }

            document.querySelectorAll(".score-input").forEach(input => {
                input.value = "";
            });

            nextHole = 1;
            roundComplete = false;
            updateNextHole();
            updateRoundCompleteState();
            calculateScores();
            saveState();

            voiceStatus.textContent = "Uusi kierros aloitettu.";
            speakMessage("Uusi kierros aloitettu");
        }

        document.querySelectorAll("#playerCountButtons button").forEach(button => {
            button.addEventListener("click", () => {
                setPlayerCount(Number(button.dataset.count));
            });
        });

        document.querySelectorAll(".player-name").forEach(input => {
            input.addEventListener("input", saveState);
        });

        buildScoreTable();
        loadState();
        updateRoundCompleteState();
        processResultsFromUrl();
    </script>
</body>
</html>
